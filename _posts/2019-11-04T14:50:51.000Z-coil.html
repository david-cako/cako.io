# Coil

<sup>2019-11-04T14:50:51.000Z</sup>

<!--kg-card-begin: markdown--><p>Oh bowed arrow, fletched of air, strung of life.</p>
<p>I long for the sound of your coiled ascent, ringed and complete.</p>
<p>How deserving and whole we all are.</p>
